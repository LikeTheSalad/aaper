name: Auto patch release

on:
  schedule:
    - cron: '0 12 1 * *'  # noon UTC on the 1st of every month
  workflow_dispatch:

jobs:
  check:
    name: Check prerequisites
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.release_info.outputs.should_release }}
      version: ${{ steps.release_info.outputs.version }}
    permissions:
      pull-requests: read
      contents: read

    steps:
      - name: Check for open PRs
        id: open_prs
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          count=$(gh pr list --state open --json number --jq length)
          if [[ $count -gt 0 ]]; then
            echo "$count open PR(s) found — skipping auto release."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v6
        if: steps.open_prs.outputs.should_release == 'true'
        with:
          fetch-depth: 0

      - name: Compute release info
        id: release_info
        if: steps.open_prs.outputs.should_release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          latest=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          [[ -z "$latest" ]] && echo "No release tags found" && exit 1

          last_tag_date=$(git log -1 --format="%cs" "$latest")

          pr_count=$(gh pr list \
            --state merged \
            --search "merged:>${last_tag_date}" \
            --json number,headRefName \
            --limit 200 \
            --jq '[.[] | select(.headRefName | test("^(auto-patch|pre-release|release)/") | not)] | length')

          if [[ $pr_count -eq 0 ]]; then
            echo "No merged PRs since $latest ($last_tag_date) — skipping release."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          ver=${latest#v}
          IFS='.' read -r major minor patch <<< "$ver"
          next="$major.$minor.$((patch + 1))"
          echo "version=$next" >> "$GITHUB_OUTPUT"
          echo "should_release=true" >> "$GITHUB_OUTPUT"

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: check
    if: needs.check.outputs.should_release == 'true'
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: ./.github/actions/setup-bot-git-user
        id: bot
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.GH_BOT_PRIVATE_KEY }}

      - uses: actions/checkout@v6
        with:
          token: ${{ steps.bot.outputs.token }}

      - uses: ./.github/actions/setup-java

      - name: Set release variables
        id: vars
        run: |
          version="${{ needs.check.outputs.version }}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"
          echo "branch=auto-patch/$version" >> "$GITHUB_OUTPUT"

      - name: Create release branch
        run: |
          git checkout -b ${{ steps.vars.outputs.branch }}
          git push --set-upstream origin ${{ steps.vars.outputs.branch }}

      - name: Set patch version in gradle.properties
        run: sed -i "s/^version=.*/version=${{ steps.vars.outputs.version }}/" gradle.properties

      - name: Update CHANGELOG.md
        env:
          VERSION: ${{ steps.vars.outputs.version }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GH_TOKEN: ${{ steps.bot.outputs.token }}
        run: sh .github/scripts/generate-patch-changelog.sh

      - name: Update README.md version references
        run: |
          sed -i 's/id("com.likethesalad.aaper") version "[0-9]\+\.[0-9]\+\.[0-9]\+"/id("com.likethesalad.aaper") version "${{ steps.vars.outputs.version }}"/g' README.md

      - uses: ./.github/actions/publish-maven-central
        with:
          maven-central-username: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          maven-central-password: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-password: ${{ secrets.GPG_PASSWORD }}

      - uses: ./.github/actions/publish-gradle-portal
        with:
          gradle-publish-key: ${{ secrets.GRADLE_PUBLISH_KEY }}
          gradle-publish-secret: ${{ secrets.GRADLE_PUBLISH_SECRET }}
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-password: ${{ secrets.GPG_PASSWORD }}

      - name: Commit release files
        run: |
          git checkout -- gradle.properties
          git add CHANGELOG.md README.md
          git commit -m "Release ${{ steps.vars.outputs.version }}"
          git push

      - name: Tag and create GitHub release
        env:
          GH_TOKEN: ${{ steps.bot.outputs.token }}
        run: |
          git tag ${{ steps.vars.outputs.tag }}
          git push origin ${{ steps.vars.outputs.tag }}
          gh release create --target ${{ steps.vars.outputs.branch }} \
                            --title "${{ steps.vars.outputs.version }}" \
                            ${{ steps.vars.outputs.tag }}

      - name: Open PR to main
        env:
          GH_TOKEN: ${{ steps.bot.outputs.token }}
        run: |
          pr_url=$(gh pr create --title "Release ${{ steps.vars.outputs.version }}" \
                                --body "Automated patch release ${{ steps.vars.outputs.version }}." \
                                --base main)
          gh pr merge "$pr_url" --auto --merge
