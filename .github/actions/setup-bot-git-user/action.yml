name: Set up bot git user
description: >
  Creates a GitHub App token and configures git to commit as the bot user.
  Exposes the token as an output for use in subsequent checkout or GH_TOKEN steps.
inputs:
  app-id:
    description: GitHub App ID
    required: true
  private-key:
    description: GitHub App private key (PEM)
    required: true
outputs:
  token:
    description: The GitHub App installation token
    value: ${{ steps.app-token.outputs.token }}
runs:
  using: composite
  steps:
    - uses: actions/create-github-app-token@v3
      id: app-token
      with:
        app-id: ${{ inputs.app-id }}
        private-key: ${{ inputs.private-key }}
    - id: get-user-id
      shell: bash
      env:
        GH_TOKEN: ${{ steps.app-token.outputs.token }}
      run: echo "user-id=$(gh api "/users/${{ steps.app-token.outputs.app-slug }}[bot]" --jq .id)" >> "$GITHUB_OUTPUT"
    - shell: bash
      run: |
        git config --global user.name '${{ steps.app-token.outputs.app-slug }}[bot]'
        git config --global user.email '${{ steps.get-user-id.outputs.user-id }}+${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com>'
