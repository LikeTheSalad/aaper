name: Set up JDK
description: >
  Sets up the JDK for all workflows in this project. To bump the Java version,
  change java-version here — no other files need updating.
runs:
  using: composite
  steps:
    - name: Set up JDK 21
      uses: actions/setup-java@v5
      with:
        java-version: '21'
        distribution: 'temurin'
